# Configuração do Netlify para o J.A.R.V.I.S. (site estático + funções)
[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# URLs amigáveis: /api/login -> /.netlify/functions/login
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
